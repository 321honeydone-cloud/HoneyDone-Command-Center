function b64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function extractFrames(file, n = 4) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const v = document.createElement("video");
    v.src = url; v.muted = true;
    v.onloadedmetadata = () => {
      const times = Array.from({ length: n }, (_, i) => (i + 0.5) * (v.duration / n));
      const frames = []; let idx = 0;
      const next = () => { if (idx >= times.length) { URL.revokeObjectURL(url); res(frames); return; } v.currentTime = times[idx]; };
      v.onseeked = () => {
        const c = document.createElement("canvas");
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext("2d").drawImage(v, 0, 0);
        frames.push(c.toDataURL("image/jpeg", 0.7).split(",")[1]);
        idx++; next();
      };
      next();
    };
    v.onerror = rej; v.load();
  });
}

async function claude(system, content) {
  const key = localStorage.getItem(KEY_API) || "";
  if (!key) throw new Error("NO_API_KEY");
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system, messages: [{ role: "user", content }] })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return JSON.parse((d.content?.[0]?.text || "").replace(/```json|```/g, "").trim());
}

// ── GOOGLE SHEETS HELPERS ─────────────────────────────────────────────────────
async function sheetPost(payload) {
  const url = localStorage.getItem(KEY_SHEET) || "";
  if (!url) throw new Error("NO_SHEET_URL");
  const r = await fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
  return r.json();
}

async function sheetGet(action="get_quotes") {
  const url = localStorage.getItem(KEY_SHEET) || "";
  if (!url) return [];
  const r = await fetch(`${url}?action=${action}`);
  const d = await r.json();
  if (action === "get_clients") return d.clients || [];
  return d.quotes || [];
}

async function fetchClientsFromDrive() {
  const url = localStorage.getItem(KEY_SHEET) || "";
  if (!url) return CSV_CLIENTS; // use pre-loaded fallback when no URL set
  try {
    const clients = await sheetGet("get_clients");
    return clients.length ? clients : CSV_CLIENTS;
  } catch {
    return CSV_CLIENTS;
  }
}

async function fetchJobberClients(token) {
  const res = await fetch(JOBBER_API, {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${token}`,"X-JOBBER-GRAPHQL-VERSION":"2024-12-11"},
    body:JSON.stringify({ query: JOBBER_QUERY })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (data.errors) throw new Error(data.errors[0]?.message || "GraphQL error");
  return (data?.data?.clients?.nodes||[]).filter(c=>!c.isArchivable).map(c=>({
    id:c.id, name:c.name||"Unknown", role:"Client",
    phone:c.phones?.[0]?.number||"", email:c.emails?.[0]?.address||"",
    address:[c.billingAddress?.street,c.billingAddress?.city].filter(Boolean).join(", "),
    priority:false, source:"jobber"
  }));
}

function parseJobberCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h=>h.trim().replace(/"/g,"").toLowerCase());
  const col = (row,...keys) => { for(const k of keys){const i=headers.findIndex(h=>h.includes(k));if(i>=0&&row[i])return row[i].replace(/"/g,"").trim();} return ""; };
  return lines.slice(1).map((line,idx)=>{
    const row=line.split(",");
    const first=col(row,"first name","firstname"),last=col(row,"last name","lastname"),company=col(row,"company");
    const name=company||[first,last].filter(Boolean).join(" ")||"Unknown";
    return {id:Date.now()+idx,name,role:"Client",phone:col(row,"phone","mobile","cell"),email:col(row,"email"),address:col(row,"street","address"),priority:false,source:"csv"};
  }).filter(c=>c.name!=="Unknown"||c.phone||c.email);
}

      {tab==="risk"&&<div>{quote.riskFlags?.map((r,i)=><div key={i} style={{display:"flex",gap:10,background:"#16120a",border:"1px solid #2e2208",borderRadius:7,padding:"11px 14px",marginBottom:7,fontSize:13,color:"#fbbf24",fontWeight:300}}><span>⚠</span><span>{r}</span></div>)}{quote.exclusions?.map((e,i)=><div key={i} style={{display:"flex",gap:10,background:"#0c1220",border:"1px solid #162040",borderRadius:7,padding:"11px 14px",marginBottom:7,fontSize:13,color:"#93c5fd",fontWeight:300}}><span>✗</span><span>{e}</span></div>)}</div>}
      {tab==="pm"&&<div style={G.cardG}><span style={{fontSize:9,color:"#3a6a4a",fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",display:"block",marginBottom:10}}>Suggested PM Message</span><p style={{fontSize:14,fontWeight:300,color:"#7abf8a",lineHeight:1.9,whiteSpace:"pre-wrap"}}>{quote.propertyManagerNote}</p></div>}
    </div>
  );

  return (
    <div>
      <div style={G.ptitle}>Quote Builder</div>
      <div style={G.psub}>Describe the job — saves to Google Sheets automatically</div>
      <div style={G.card}>
        <span style={G.lbl}>Customer & Location</span>
        {/* Client dropdown from Drive */}
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <select style={{...G.inp,flex:1}} value={client} onChange={e=>{setClient(e.target.value);const c=clientList.find(x=>x.name===e.target.value);if(c?.city)setCity(c.city);}}>
            <option value="">— Select client —</option>
            {clientList.map((c,i)=><option key={i} value={c.name}>{c.name}{c.city?` · ${c.city}`:""}</option>)}
          </select>
          <button onClick={loadClients} disabled={loadingClients} style={{...G.btnBlue,padding:"10px 13px",fontSize:11,flexShrink:0}}>{loadingClients?"...":"↻"}</button>
        </div>
        {clientList.length===0&&!loadingClients&&<div style={{fontSize:11,color:"#2e3a44",marginBottom:10,fontWeight:300}}>Tap ↻ to load active clients from your Drive CSV · Or type a name below</div>}
        <input style={{...G.inp,marginBottom:10}} placeholder="Or type client name manually" value={client} onChange={e=>setClient(e.target.value)}/>
        <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:10}}>
          {["Homeowner","Property Manager","Landlord"].map(t=><button key={t} style={G.chip(ctype===t)} onClick={()=>setCtype(t)}>{t}</button>)}
        </div>
        <div style={G.g2}>
          <select style={G.inp} value={cat} onChange={e=>setCat(e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select>
          <select style={G.inp} value={city} onChange={e=>setCity(e.target.value)}>{CITIES.map(c=><option key={c}>{c}</option>)}</select>
        </div>
      </div>
      <div style={G.card}>
        <span style={G.lbl}>📷 Photos & Video — Optional</span>
        <input ref={fRef} type="file" multiple accept="image/*,video/*" style={{display:"none"}} onChange={e=>{addFiles(e.target.files);e.target.value="";}}/>
        <input ref={pRef} type="file" multiple accept="image/*" style={{display:"none"}} onChange={e=>{addFiles(e.target.files);e.target.value="";}}/>
        <input ref={vRef} type="file" multiple accept="video/*" style={{display:"none"}} onChange={e=>{addFiles(e.target.files);e.target.value="";}}/>
        <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);addFiles(e.dataTransfer.files);}} style={{border:`2px dashed ${drag?"#e9a81e":"#1c2228"}`,borderRadius:9,padding:"20px 14px",textAlign:"center",background:drag?"#0c1008":"#080a0b",marginBottom:10}}>
          <div style={{fontSize:26,marginBottom:6}}>{drag?"📂":"⬆️"}</div>
          <div style={{fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",fontWeight:700,fontSize:13,letterSpacing:"0.1em",textTransform:"uppercase",color:"#3a4a56"}}>{drag?"Drop it here":"Drag & Drop Files Here"}</div>
          <div style={{fontSize:11,color:"#1e2830",marginTop:3}}>JPG · PNG · MP4 · MOV · up to 6 files</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[{ref:fRef,ico:"📁",label:"All Files",sub:"Photos+Video"},{ref:pRef,ico:"📷",label:"Photos",sub:"JPG·PNG"},{ref:vRef,ico:"🎬",label:"Video",sub:"MP4·MOV"}].map(b=>(
            <button key={b.label} onClick={()=>b.ref.current?.click()} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"#080a0b",border:"1px solid #1c2228",borderRadius:8,padding:"13px 8px",cursor:"pointer"}}>
              <span style={{fontSize:16}}>{b.ico}</span>
              <span style={{fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",fontWeight:700,fontSize:12,letterSpacing:"0.06em",textTransform:"uppercase",color:"#3a4a56"}}>{b.label}</span>
              <span style={{fontSize:9,color:"#1e2830",textTransform:"uppercase"}}>{b.sub}</span>
            </button>
          ))}
        </div>
        {media.length>0&&<div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(78px,1fr))",gap:8,marginTop:12}}>
            {media.map((m,i)=>(
              <div key={i} style={{position:"relative",borderRadius:7,overflow:"hidden",aspectRatio:"1",background:"#0c1014",border:"1px solid #1c2228"}}>
                {m.type==="image"?<img src={m.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<video src={m.url} muted playsInline style={{width:"100%",height:"100%",objectFit:"cover"}}/>}
                <button onClick={()=>setMedia(p=>p.filter((_,j)=>j!==i))} style={{position:"absolute",top:4,right:4,width:20,height:20,background:"rgba(0,0,0,0.8)",border:"none",borderRadius:"50%",color:"#aaa",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                <span style={{position:"absolute",bottom:4,left:4,background:"rgba(0,0,0,0.85)",color:"#e9a81e",fontSize:8,fontWeight:700,padding:"2px 5px",borderRadius:2,fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif"}}>{m.type==="video"?"🎬":"📷"}</span>
              </div>
            ))}
            {media.length<6&&<div onClick={()=>fRef.current?.click()} style={{border:"2px dashed #1c2228",borderRadius:7,aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",gap:4}}><span style={{fontSize:20,color:"#2e3a44"}}>+</span></div>}
          </div>
          <div style={{fontSize:11,color:"#2e3a44",marginTop:8}}>{media.length} file(s) attached</div>
        </div>}
      </div>
      <div style={G.card}>
        <span style={G.lbl}>Job Description{media.length>0?" — Optional":""}</span>
        <textarea style={{...G.inp,resize:"vertical",lineHeight:1.8}} rows={5} value={desc} onChange={e=>setDesc(e.target.value)} placeholder={"Talk it out like you're planning the job. Example: PM sent a work order for a Rockledge rental. Back door drags, deadbolt won't line up. GFCI in garage is dead. Mid-90s house."}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12}}>
          <span style={{fontSize:11,color:"#1e2830"}}>Builds estimate + saves to Sheets automatically</span>
          <button style={{...G.btnGold,opacity:(!desc.trim()&&media.length===0)||loading?0.4:1}} onClick={generate} disabled={(!desc.trim()&&media.length===0)||loading}>{loading?"Building...":"Generate →"}</button>
        </div>
      </div>
      {loading&&<div style={{textAlign:"center",padding:"40px 16px"}}><div style={{fontSize:36,display:"inline-block",animation:"spin 2s linear infinite",marginBottom:12}}>🐝</div><div style={{fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",fontWeight:700,fontSize:13,letterSpacing:"0.22em",textTransform:"uppercase",color:"#e9a81e"}}>{loadMsg||"Building..."}</div><style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}`}</style></div>}
      {err&&<div style={{background:"#180a0a",border:"1px solid #6b1d1d",borderRadius:8,padding:14,color:"#fca5a5",fontSize:13,marginTop:12}}>{err}</div>}
    </div>
  );
}

// ── QUICK DIAL ─────────────────────────────────────────────────────────────────
function QuickDial() {
  const [contacts,setContacts]=useState([]);
  const [loadingC,setLoadingC]=useState(false);
  const [loadErr,setLoadErr]=useState("");
  const [filter,setFilter]=useState("All");
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({name:"",role:"Property Manager",phone:"",email:"",address:"",priority:false});
  const csvRef=useRef(null);

  const avColors={"Property Manager":"linear-gradient(135deg,#f0b020,#d4920a)","Client":"linear-gradient(135deg,#60a5fa,#3b82f6)","Supplier":"linear-gradient(135deg,#a78bfa,#7c3aed)","Subcontractor":"linear-gradient(135deg,#34d399,#059669)"};
  const initials=n=>n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const filtered=filter==="All"?contacts:contacts.filter(c=>c.role===filter);

  const loadFromDrive=async()=>{
    setLoadingC(true);setLoadErr("");
    try {
      const clients=await fetchClientsFromDrive();
      if(!clients.length){setLoadErr("No clients returned.");setLoadingC(false);return;}
      const manual=contacts.filter(c=>c.source==="manual");
      const mapped=clients.map((c,i)=>({
        id:`drive-${i}`, name:c.name, role:"Client",
        phone:c.phone||"", email:c.email||"",
        address:c.address||"", city:c.city||"",
        priority:false, source:"drive"
      }));
      setContacts([...manual,...mapped]);
    } catch(e){setLoadErr("Could not load clients. Check your Web App URL in Settings.");}
    setLoadingC(false);
  };

  // Auto-load on mount
  useEffect(()=>{ loadFromDrive(); }, []);

  const handleCSV=(e)=>{
    const file=e.target.files?.[0];if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const clients=parseJobberCSV(ev.target.result);
      const manual=contacts.filter(c=>c.source==="manual");
      setContacts([...manual,...clients.map((c,i)=>({...c,id:`csv-${i}`,role:"Client",priority:false,source:"csv"}))]);
    };
    reader.readAsText(file);e.target.value="";
  };

  const saveContact=()=>{
    if(!form.name) return;
    setContacts(p=>[...p,{...form,id:Date.now(),source:"manual"}]);
    setForm({name:"",role:"Property Manager",phone:"",email:"",address:"",priority:false});
    setShowAdd(false);
  };
  return (
    <div>
      <div style={{...G.row,marginBottom:14}}>
        <div><div style={G.ptitle}>Quick Dial</div><div style={G.psub}>Tap 📞 to call instantly</div></div>
        <div style={{display:"flex",gap:8}}>
          <input ref={csvRef} type="file" accept=".csv" style={{display:"none"}} onChange={handleCSV}/>
          <button style={{...G.btnGhost,padding:"8px 12px",fontSize:11}} onClick={()=>csvRef.current?.click()}>📄 CSV</button>
          <button style={{...G.btnBlue,padding:"8px 12px",fontSize:11}} onClick={loadFromDrive} disabled={loadingC}>{loadingC?"Loading...":"↻ Drive"}</button>
        </div>
      </div>

      {loadErr&&<div style={{background:"#1a0a0a",border:"1px solid #2a1010",borderRadius:8,padding:"11px 14px",marginBottom:12,fontSize:12,color:"#fca5a5",fontWeight:300}}>{loadErr}</div>}

      {contacts.length===0&&!loadingC&&(
        <div style={{...G.card,textAlign:"center",padding:"40px 20px",border:"1px dashed #1c2228"}}>
          <div style={{fontSize:40,marginBottom:12}}>📇</div>
          <div style={{fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",fontWeight:700,fontSize:14,letterSpacing:"0.1em",color:"#fff",marginBottom:8}}>NO CLIENTS LOADED</div>
          <div style={{fontSize:13,fontWeight:300,color:"#3a4a56",lineHeight:1.8}}>
            Tap <strong style={{color:"#60a5fa"}}>↻ Drive</strong> to pull your active clients<br/>
            from <strong style={{color:"#e9a81e"}}>Jobber_Clients_1_of_1.csv</strong><br/>
            in your Google Drive automatically.<br/><br/>
            Or drop a CSV manually.
          </div>
        </div>
      )}

      {contacts.filter(c=>c.source==="drive"||c.source==="csv").length>0&&(
        <div style={{background:"#0a1a0e",border:"1px solid #162a1c",borderRadius:8,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:14}}>📊</span>
          <span style={{fontSize:12,fontWeight:300,color:"#7abf8a"}}>
            {contacts.filter(c=>c.source==="drive").length>0
              ? `${contacts.filter(c=>c.source==="drive").length} active clients loaded from Google Drive`
              : `${contacts.filter(c=>c.source==="csv").length} clients loaded from CSV`
            }
          </span>
          <button onClick={loadFromDrive} style={{marginLeft:"auto",background:"transparent",border:"none",color:"#3a6a4a",fontSize:11,cursor:"pointer",fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}}>Refresh</button>
        </div>
      )}

      <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:14}}>
        {["All","Property Manager","Client","Supplier","Subcontractor"].map(r=><button key={r} style={G.chip(filter===r)} onClick={()=>setFilter(r)}>{r==="All"?`All (${contacts.length})`:`${r.split(" ")[0]} (${contacts.filter(c=>c.role===r).length})`}</button>)}
      </div>

      {filtered.filter(c=>c.priority).length>0&&<><span style={{...G.lbl,marginBottom:8}}>⭐ Priority</span>{filtered.filter(c=>c.priority).map(c=><ContactRow key={c.id} c={c} avColors={avColors} initials={initials} onRemove={id=>setContacts(p=>p.filter(x=>x.id!==id))}/>)}</>}
      {filtered.filter(c=>!c.priority).map(c=><ContactRow key={c.id} c={c} avColors={avColors} initials={initials} onRemove={id=>setContacts(p=>p.filter(x=>x.id!==id))}/>)}
      <button style={{...G.btnGold,width:"100%",marginTop:8}} onClick={()=>setShowAdd(true)}>+ Add Contact</button>
      {showAdd&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:100,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowAdd(false)}>
          <div style={{background:"#131518",borderRadius:"16px 16px 0 0",padding:"24px 20px",width:"100%",maxHeight:"85vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",fontWeight:800,fontSize:20,color:"#fff",marginBottom:16}}>Add Contact</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <input style={G.inp} placeholder="Name or Business *" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/>
              <select style={G.inp} value={form.role} onChange={e=>setForm(p=>({...p,role:e.target.value}))}>{["Property Manager","Client","Supplier","Subcontractor"].map(r=><option key={r}>{r}</option>)}</select>
              <input style={G.inp} placeholder="Phone" value={form.phone} onChange={e=>setForm(p=>({...p,phone:e.target.value}))}/>

function JobComplete({onLogged}) {
  const [savedQuotes,setSavedQuotes]=useState([]);
  const [loadingQuotes,setLoadingQuotes]=useState(false);
  const [selectedQuote,setSelectedQuote]=useState("");
  const [jobName,setJobName]=useState("");
  const [city,setCity]=useState("Melbourne");
  const [notes,setNotes]=useState("");
  const [invoiceAmt,setInvoiceAmt]=useState("");
  const [actualHours,setActualHours]=useState("");
  const [before,setBefore]=useState(null);
  const [after,setAfter]=useState(null);
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [copied,setCopied]=useState("");
  const [sheetStatus,setSheetStatus]=useState("");
  const bRef=useRef(null),aRef=useRef(null);
  const timeNow=new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true});

  // Load saved quotes from sheet for dropdown
  const loadQuotes=async()=>{
    setLoadingQuotes(true);
    try {
      const q=await sheetGet();
      setSavedQuotes(q.filter(q=>q.status!=="Completed"));
    } catch(e){setSavedQuotes([]);}
    setLoadingQuotes(false);
  };

  // When user selects a quote from dropdown, pre-fill job name
  const onSelectQuote=(e)=>{
    const qid=e.target.value;
    setSelectedQuote(qid);
    const q=savedQuotes.find(q=>q.quoteId===qid);
    if(q){setJobName(q.jobTitle||"");setCity(q.city||"Melbourne");}
  };

  const pickPhoto=async(e,setter)=>{const file=e.target.files?.[0];if(!file) return;setter({url:URL.createObjectURL(file),data:await b64(file),type:file.type});e.target.value="";};

  const generate=async()=>{
    if(!jobName.trim()) return;
    setLoading(true);setResult(null);setSheetStatus("");
    try {
      const parts=[];
      if(before){parts.push({type:"image",source:{type:"base64",media_type:before.type,data:before.data}});parts.push({type:"text",text:"[BEFORE photo]"});}
      if(after){parts.push({type:"image",source:{type:"base64",media_type:after.type,data:after.data}});parts.push({type:"text",text:"[AFTER photo]"});}
      parts.push({type:"text",text:`Job: ${jobName}
City: ${city}
Time: ${timeNow}
Notes: ${notes||"None"}

Generate professional completion docs for Jobber.`});
      const r=await claude(COMPLETE_SYS,parts);
      setResult(r);
      if(onLogged) onLogged();
      // Save to sheet
      if(selectedQuote){
        setSheetStatus("saving");
        try {
          await saveCompletionToSheet({
            quoteId:selectedQuote,
            timeCompleted:timeNow,
            actualHours:actualHours||"",
            completionNotes:notes||"",
            invoiceAmount:invoiceAmt||"",
            beforePhoto:before?{data:before.data,mimeType:before.type}:null,
            afterPhoto:after?{data:after.data,mimeType:after.type}:null,
          });
          setSheetStatus("saved");
        } catch(e){setSheetStatus("error");}
      }
    } catch{setResult({completionNote:"Could not generate — write your own notes here.",followUpMessage:"",tip:""});}
    setLoading(false);
  };

  const copy=(text,key)=>{navigator.clipboard.writeText(text);setCopied(key);setTimeout(()=>setCopied(""),2200);};

  if(result) return (
    <div>
      <div style={{...G.cardG,marginBottom:12}}>
        <div style={G.row}><div><div style={{fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",fontWeight:900,fontSize:18,color:"#22c55e"}}>✓ JOB LOGGED</div><div style={{fontSize:12,fontWeight:300,color:"#3a4a56",marginTop:2}}>{jobName} · {city} · {timeNow}</div></div><span style={{fontSize:28}}>🎉</span></div>
      </div>
      {sheetStatus==="saved"&&<div style={{background:"#0a1a0e",border:"1px solid #162a1c",borderRadius:8,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:16}}>📊</span><span style={{fontSize:13,fontWeight:300,color:"#7abf8a"}}>Completion data saved to <strong>Jobs and Quotes</strong> sheet · Photos uploaded to Drive</span></div>}
      {sheetStatus==="error"&&<div style={{background:"#1a0a0a",border:"1px solid #2a1010",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#fca5a5"}}>Sheet save failed — check your Web App URL in Settings</div>}
      {result.tip&&<div style={{...G.card,background:"#0a1a14",border:"1px solid #1a3020",marginBottom:12}}><span style={{fontSize:9,color:"#3a6a4a",fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",display:"block",marginBottom:6}}>Pro Tip</span><div style={{fontSize:13,fontWeight:300,color:"#7abf8a",lineHeight:1.7}}>{result.tip}</div></div>}
      <div style={G.card}><div style={{...G.row,marginBottom:10}}><span style={G.lbl}>Jobber Note</span><button style={{...G.btnGhost,...(copied==="note"?{background:"#16a34a",color:"#fff",border:"none"}:{}),padding:"6px 14px",fontSize:11}} onClick={()=>copy(result.completionNote,"note")}>{copied==="note"?"✓ Copied":"Copy"}</button></div><div style={{fontSize:13,fontWeight:300,color:"#a8a098",lineHeight:1.8,whiteSpace:"pre-wrap",background:"#080a0b",border:"1px solid #1c2228",borderRadius:7,padding:"12px 14px"}}>{result.completionNote}</div></div>
      {result.followUpMessage&&<div style={G.card}><div style={{...G.row,marginBottom:10}}><span style={G.lbl}>Follow-Up</span><button style={{...G.btnGhost,...(copied==="fu"?{background:"#16a34a",color:"#fff",border:"none"}:{}),padding:"6px 14px",fontSize:11}} onClick={()=>copy(result.followUpMessage,"fu")}>{copied==="fu"?"✓ Copied":"Copy"}</button></div><div style={{fontSize:13,fontWeight:300,color:"#a8a098",lineHeight:1.8,background:"#080a0b",border:"1px solid #1c2228",borderRadius:7,padding:"12px 14px"}}>{result.followUpMessage}</div></div>}
      {(before||after)&&<div style={G.card}><span style={G.lbl}>Photos</span><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{[{label:"BEFORE",photo:before},{label:"AFTER",photo:after}].map(({label,photo})=>photo&&(<div key={label}><img src={photo.url} alt={label} style={{width:"100%",borderRadius:8,height:90,objectFit:"cover"}}/><div style={{textAlign:"center",fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",fontWeight:700,fontSize:9,letterSpacing:"0.12em",color:"#3a4a56",marginTop:4}}>{label}</div></div>))}</div></div>}
      <button style={{...G.btnGhost,width:"100%"}} onClick={()=>{setResult(null);setJobName("");setNotes("");setBefore(null);setAfter(null);setSelectedQuote("");setInvoiceAmt("");setActualHours("");setSheetStatus("");}}>Log Another Job</button>
    </div>
  );

  return (
    <div>
      <div style={G.ptitle}>Job Complete</div>
      <div style={G.psub}>Log it, document it, sync to Sheets</div>

      {/* Quote selector from Sheets */}
      <div style={G.card}>
        <div style={{...G.row,marginBottom:10}}>
          <span style={G.lbl}>Select Quote from Sheets</span>
          <button style={{...G.btnBlue,padding:"6px 12px",fontSize:11}} onClick={loadQuotes} disabled={loadingQuotes}>{loadingQuotes?"Loading...":"↻ Load"}</button>
        </div>
        {savedQuotes.length>0?(
          <select style={G.inp} value={selectedQuote} onChange={onSelectQuote}>
            <option value="">— Select a quote —</option>
            {savedQuotes.map(q=>(
              <option key={q.quoteId} value={q.quoteId}>{q.jobTitle}{q.client?` — ${q.client}`:""}{q.dateQuoted?` (${q.dateQuoted})`:""} · ${parseFloat(q.total||0).toFixed(2)}</option>
            ))}
          </select>
        ):(
          <div style={{fontSize:12,color:"#2e3a44",fontWeight:300,lineHeight:1.7}}>
            {localStorage.getItem(KEY_SHEET)?'Tap ↻ Load to pull your quotes from Google Sheets, or fill in the job details manually below.':"Add your Web App URL in Settings to enable quote syncing."}
          </div>
        )}
      </div>

      <div style={G.card}>
        <span style={G.lbl}>Job Details</span>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <input style={G.inp} placeholder="Job name or description" value={jobName} onChange={e=>setJobName(e.target.value)}/>
          <select style={G.inp} value={city} onChange={e=>setCity(e.target.value)}>{CITIES.map(c=><option key={c}>{c}</option>)}</select>
          <textarea style={{...G.inp,resize:"vertical",lineHeight:1.8}} rows={4} placeholder="Field notes — what you did, issues found, follow-up needed..." value={notes} onChange={e=>setNotes(e.target.value)}/>
          <div style={G.g2}>
            <input style={G.inp} placeholder="Actual hours" value={actualHours} onChange={e=>setActualHours(e.target.value)}/>
            <input style={G.inp} placeholder="Invoice $ (if different)" value={invoiceAmt} onChange={e=>setInvoiceAmt(e.target.value)}/>
          </div>
        </div>
      </div>

      <div style={G.card}>
        <span style={G.lbl}>Before & After Photos</span>
        <input ref={bRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>pickPhoto(e,setBefore)}/>
        <input ref={aRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>pickPhoto(e,setAfter)}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[{label:"BEFORE",photo:before,ref:bRef,setter:setBefore},{label:"AFTER",photo:after,ref:aRef,setter:setAfter}].map(({label,photo,ref,setter})=>(
            <div key={label}>
              <div onClick={()=>ref.current?.click()} style={{border:`2px dashed ${photo?"transparent":"#1c2228"}`,borderRadius:8,overflow:"hidden",cursor:"pointer",aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:photo?"transparent":"#080a0b"}}>
                {photo?<img src={photo.url} alt={label} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<><div style={{fontSize:24}}>📷</div><div style={{fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",fontWeight:700,fontSize:11,letterSpacing:"0.12em",color:"#3a4a56",marginTop:6}}>{label}</div></>}
              </div>
              {photo&&<button style={{...G.btnGhost,width:"100%",marginTop:6,padding:"5px 0",fontSize:11}} onClick={()=>setter(null)}>Remove</button>}
            </div>
          ))}
        </div>
        {selectedQuote&&<div style={{fontSize:11,color:"#3a6a4a",marginTop:10,fontWeight:300}}>📊 Photos will be uploaded to Google Drive and linked in your sheet</div>}
      </div>

      <div style={{...G.card,marginBottom:12}}>
        <div style={G.row}><div><div style={{fontSize:11,color:"#3a4a56",fontWeight:300,marginBottom:2}}>Completion Time</div><div style={{fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",fontWeight:900,fontSize:26,color:"#e9a81e"}}>{timeNow}</div></div><span style={{fontSize:26}}>🕐</span></div>
      </div>

      {loading?<div style={{textAlign:"center",padding:"30px 0"}}><div style={{fontSize:34,display:"inline-block",animation:"spin 2s linear infinite"}}>🐝</div><div style={{fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",fontWeight:700,fontSize:13,letterSpacing:"0.22em",textTransform:"uppercase",color:"#e9a81e",marginTop:12}}>Generating docs{selectedQuote?" & syncing to Sheets":""}...</div><style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}`}</style></div>
      :<button style={{...G.btnGold,width:"100%",opacity:!jobName.trim()?0.4:1}} onClick={generate} disabled={!jobName.trim()}>Generate Completion Docs →</button>}
    </div>
  );
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function Settings() {
  const [apiKey,setApiKey]=useState(localStorage.getItem(KEY_API)||"");
  const [sheetUrl,setSheetUrl]=useState(localStorage.getItem(KEY_SHEET)||"");
  const [saved,setSaved]=useState("");

  const saveAll=()=>{
    localStorage.setItem(KEY_API,apiKey.trim());
    localStorage.setItem(KEY_SHEET,sheetUrl.trim());
    setSaved("saved");setTimeout(()=>setSaved(""),2000);
  };

  return (
    <div>
      <div style={G.ptitle}>Settings</div>
      <div style={G.psub}>API key and Google Sheets connection</div>

      <div style={G.card}>
        <span style={G.lbl}>Anthropic API Key</span>
        <div style={{fontSize:12,color:"#2e3a44",lineHeight:1.7,marginBottom:10}}>Powers all AI features — quotes, mission briefs, completion docs.<br/><a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={{color:"#60a5fa"}}>Get yours at console.anthropic.com</a></div>
        <input style={{...G.inp,fontFamily:"monospace",fontSize:12,marginBottom:10}} type="password" placeholder="sk-ant-api03-..." value={apiKey} onChange={e=>setApiKey(e.target.value)}/>
      </div>

      <div style={G.card}>
        <span style={G.lbl}>Google Sheets Web App URL</span>
        <div style={{fontSize:12,color:"#2e3a44",lineHeight:1.8,marginBottom:10}}>
          <strong style={{color:"#e9a81e"}}>Setup steps:</strong><br/>
          1. Create a Google Sheet named <strong style={{color:"#bdb5a8"}}>"Jobs and Quotes"</strong><br/>
          2. Open <strong style={{color:"#bdb5a8"}}>Extensions → Apps Script</strong><br/>
          3. Paste the HoneyDone script provided<br/>
          4. Click <strong style={{color:"#bdb5a8"}}>Deploy → New Deployment → Web App</strong><br/>
          5. Set <strong style={{color:"#bdb5a8"}}>"Execute as: Me"</strong> and <strong style={{color:"#bdb5a8"}}>"Anyone can access"</strong><br/>
          6. Copy the Web App URL and paste it below
        </div>
        <input style={{...G.inp,fontSize:12,marginBottom:10}} placeholder="https://script.google.com/macros/s/.../exec" value={sheetUrl} onChange={e=>setSheetUrl(e.target.value)}/>
        {sheetUrl&&<div style={{fontSize:11,color:"#3a6a4a",marginBottom:10}}>✓ Quotes will auto-save · Completions sync with photos</div>}
      </div>

      <button style={{...G.btnGold,...(saved?{background:"linear-gradient(135deg,#22c55e,#16a34a)"}:{}),width:"100%",fontSize:14,padding:"13px"}} onClick={saveAll}>{saved?"✓ Settings Saved!":"Save Settings"}</button>

      <div style={{...G.card,marginTop:11,background:"#0a0c0e",border:"1px solid #1a1e22"}}>
        <span style={G.lbl}>About</span>
        <div style={{fontSize:13,fontWeight:300,color:"#3a4a56",lineHeight:1.8}}>
          HoneyDone Command Center<br/>
          <a href="https://321honeydone.com" target="_blank" rel="noreferrer" style={{color:"#e9a81e",textDecoration:"none"}}>321honeydone.com</a> · Brevard County, FL · Veteran-Owned
        </div>
      </div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
const TABS=[
  {id:"dash",ico:"🏠",label:"Home"},
  {id:"quote",ico:"📋",label:"Quote"},
  {id:"dial",ico:"📞",label:"Dial"},
  {id:"prep",ico:"🔧",label:"Prep"},
  {id:"done",ico:"✅",label:"Done"},
  {id:"settings",ico:"⚙️",label:"Settings"},
];

function App() {
  const [tab,setTab]=useState("dash");
  const [stats,setStats]=useState(getStored(KEY_STATS,{revenue:"0",jobs:"0",quotes:"0",unpaid:"0"}));
  const [activeQuote,setActiveQuote]=useState(null);

  const onQuoteDone=(q,qid,client,city)=>{
    const ns={...stats,quotes:String(parseInt(stats.quotes||0)+1)};
    setStats(ns);setStored(KEY_STATS,ns);
    setActiveQuote(q);
  };

  const hasKey=!!localStorage.getItem(KEY_API);

  if(!hasKey&&tab!=="settings") return (
    <div style={{minHeight:"100vh",background:"#0a0c0d",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px"}}>
      <img src={LOGO} alt="HoneyDone" style={{height:48,marginBottom:20}} onError={e=>e.target.style.display="none"}/>
      <div style={{fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",fontWeight:900,fontSize:26,color:"#fff",letterSpacing:"0.04em",marginBottom:4,textAlign:"center"}}>HONEYDONE</div>
      <div style={{fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",fontWeight:700,fontSize:12,letterSpacing:"0.2em",textTransform:"uppercase",color:"#e9a81e",marginBottom:32}}>Command Center</div>
      <div style={{width:"100%",maxWidth:420,background:"#121518",border:"1px solid #1c2228",borderRadius:12,padding:"24px 22px"}}>
        <div style={{fontWeight:700,fontSize:14,color:"#fff",marginBottom:8}}>One-Time Setup Required</div>
        <div style={{fontSize:13,fontWeight:300,color:"#3a4a56",lineHeight:1.7,marginBottom:20}}>You need an Anthropic API key to power the AI features. Get yours free at <a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={{color:"#60a5fa"}}>console.anthropic.com</a> then tap Settings below.</div>
        <button style={{...G.btnGold,width:"100%"}} onClick={()=>setTab("settings")}>Go to Settings →</button>
      </div>
    </div>
  );

  return (
    <div style={G.app}>
      <style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}`}</style>
      <div style={G.hdr}>
        <img src={LOGO} alt="HoneyDone" style={G.logo} onError={e=>{e.target.style.display="none";}}/>
        <div style={G.hdiv}/>
        <span style={G.htitle}>Command Center</span>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          {activeQuote&&<div onClick={()=>setTab("prep")} style={{background:"#e9a81e",color:"#0a0c0d",fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",fontWeight:700,fontSize:10,letterSpacing:"0.12em",padding:"3px 9px",borderRadius:4,cursor:"pointer"}}>BRIEF READY</div>}
          <span style={G.hdate}>{today}</span>
        </div>
      </div>
      <div style={G.scroll}>
        {tab==="dash"     && <Dashboard stats={stats} setStats={setStats}/>}
        {tab==="quote"    && <QuoteBuilder onQuoteDone={onQuoteDone}/>}
        {tab==="dial"     && <QuickDial/>}
        {tab==="prep"     && <PrepChecklist activeQuote={activeQuote}/>}
        {tab==="done"     && <JobComplete onLogged={()=>{const ns={...stats,jobs:String(parseInt(stats.jobs||0)+1)};setStats(ns);setStored(KEY_STATS,ns);}}/>}
        {tab==="settings" && <Settings/>}
      </div>
      <nav style={G.nav}>
        {TABS.map(t=>(
          <button key={t.id} style={G.navBtn(tab===t.id)} onClick={()=>setTab(t.id)}>
            <span style={{fontSize:tab==="settings"?15:18,lineHeight:1}}>{t.ico}</span>
            <span style={G.navLbl(tab===t.id)}>{t.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
